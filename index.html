<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #080212;
        --bg-mid: #1a0535;
        --card-bg: rgba(10, 5, 30, 0.62);
        --card-border: rgba(255, 255, 255, 0.1);
        --input-bg: rgba(255, 255, 255, 0.06);
        --input-border: rgba(255, 255, 255, 0.12);
        --btn-gold-start: #b8720a;
        --btn-gold-mid: #e8a020;
        --btn-gold-end: #c8860a;
        --btn-text: #1a0a00;
        --text-primary: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.65);
        --text-faint: rgba(255, 255, 255, 0.35);
        --text-icon: rgba(255, 255, 255, 0.45);
        --font-display: 'Cinzel', 'Georgia', serif;
        --font-body: 'Inter', 'Helvetica Neue', sans-serif;
        --radius-card: 20px;
        --radius-input: 12px;
        --radius-pill: 999px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        font-family: var(--font-body);
        color: var(--text-primary);
        background: radial-gradient(circle at center, var(--bg-mid) 0%, var(--bg-deep) 68%);
      }

      .viewport {
        position: relative;
        width: 100vw;
        height: 100vh;
        isolation: isolate;
      }

      #star-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .constellation {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.55;
      }

      .constellation svg {
        width: 100%;
        height: 100%;
      }

      .cloud-bank {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -80px;
        height: 40vh;
        z-index: 2;
        pointer-events: none;
      }

      .cloud {
        position: absolute;
        border-radius: 999px;
        filter: blur(40px);
      }

      .cloud.one {
        width: 75%;
        height: 160px;
        left: -12%;
        bottom: 12%;
        background: rgba(80, 20, 120, 0.3);
      }

      .cloud.two {
        width: 68%;
        height: 170px;
        left: 20%;
        bottom: 8%;
        background: rgba(120, 40, 160, 0.2);
      }

      .cloud.three {
        width: 54%;
        height: 150px;
        right: -12%;
        bottom: 18%;
        background: rgba(80, 20, 120, 0.3);
      }

      .cloud.four {
        width: 60%;
        height: 120px;
        left: 10%;
        bottom: 34%;
        background: rgba(120, 40, 160, 0.2);
      }

      .app-shell {
        position: relative;
        z-index: 3;
        width: min(100%, 420px);
        height: 100%;
        margin: 0 auto;
        padding: 18px 16px 24px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .character {
        position: absolute;
        pointer-events: none;
        user-select: none;
      }

      .char-aries {
        width: 140px;
        top: 60px;
        left: -20px;
        z-index: 2;
      }

      .char-dragon {
        width: 160px;
        top: 40px;
        right: -30px;
        z-index: 2;
      }

      .char-scorpio {
        width: 120px;
        bottom: 80px;
        left: -10px;
        z-index: 2;
      }

      .char-female {
        width: 130px;
        bottom: 60px;
        right: -20px;
        z-index: 2;
      }

      .char-shiva {
        width: 130px;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 4;
      }

      .top {
        position: relative;
        z-index: 6;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
        padding: 6px 18px;
        border-radius: var(--radius-pill);
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(20, 10, 40, 0.7);
        color: var(--text-primary);
        font-size: 13px;
        font-family: var(--font-display);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 12px auto 0;
        max-width: 330px;
        font-family: var(--font-display);
        font-size: clamp(28px, 7vw, 38px);
        font-weight: 700;
        line-height: 1.2;
        color: var(--text-primary);
        text-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .subtitle {
        max-width: 300px;
        margin: 10px auto 0;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .form-wrap {
        position: relative;
        z-index: 8;
        margin-top: auto;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-card);
        padding: 24px 20px;
        backdrop-filter: blur(16px);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }

      .card h2 {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 700;
      }

      .helper {
        margin: 0 0 18px;
        font-size: 12px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.5);
      }

      .field {
        position: relative;
        margin-bottom: 10px;
      }

      .field input {
        width: 100%;
        height: 50px;
        border-radius: var(--radius-input);
        border: 1px solid var(--input-border);
        background: var(--input-bg);
        color: var(--text-primary);
        padding: 0 16px 0 44px;
        font-size: 14px;
        outline: none;
        font-family: var(--font-body);
      }

      .field input::placeholder {
        color: var(--text-faint);
      }

      .field input:focus {
        border-color: rgba(232, 160, 32, 0.5);
        box-shadow: 0 0 0 3px rgba(232, 160, 32, 0.15);
      }

      .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-icon);
        width: 18px;
        height: 18px;
        display: inline-flex;
      }

      .hint-right {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
        pointer-events: none;
      }

      .cta {
        width: 100%;
        height: 52px;
        margin-top: 6px;
        border: none;
        border-radius: 30px;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        color: var(--btn-text);
        background: linear-gradient(135deg, var(--btn-gold-start) 0%, var(--btn-gold-mid) 50%, var(--btn-gold-end) 100%);
        box-shadow: 0 4px 20px rgba(200, 130, 10, 0.4);
        transition: transform 0.2s ease, filter 0.2s ease;
        animation: glowPulse 2s ease-in-out infinite;
      }

      .cta:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }

      .cta:active {
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      @keyframes glowPulse {
        0%,
        100% {
          box-shadow: 0 4px 20px rgba(200, 130, 10, 0.3);
        }
        50% {
          box-shadow: 0 8px 28px rgba(200, 130, 10, 0.6);
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <canvas id="star-canvas" aria-hidden="true"></canvas>

      <div class="constellation" aria-hidden="true">
        <svg viewBox="0 0 420 900" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="rgba(255,221,149,0.35)" stroke-width="1.2">
            <path d="M270 100 L305 85 L336 95 L362 76" />
            <path d="M264 172 L292 187 L318 171 L342 191" />
          </g>
          <g fill="rgba(255,221,149,0.9)">
            <circle cx="270" cy="100" r="2" />
            <circle cx="305" cy="85" r="2.2" />
            <circle cx="336" cy="95" r="2" />
            <circle cx="362" cy="76" r="2.4" />
            <circle cx="264" cy="172" r="2" />
            <circle cx="292" cy="187" r="2.1" />
            <circle cx="318" cy="171" r="2" />
            <circle cx="342" cy="191" r="2.2" />
          </g>
        </svg>
      </div>

      <div class="cloud-bank" aria-hidden="true">
        <div class="cloud one"></div>
        <div class="cloud two"></div>
        <div class="cloud three"></div>
        <div class="cloud four"></div>
      </div>

      <main class="app-shell">
        <img class="character char-aries" src="./assets/char-aries.png" alt="Aries character placeholder" />
        <img class="character char-dragon" src="./assets/char-dragon.png" alt="Dragon character placeholder" />
        <img class="character char-scorpio" src="./assets/char-scorpio.png" alt="Scorpio character placeholder" />
        <img class="character char-female" src="./assets/char-female.png" alt="Female character placeholder" />
        <img class="character char-shiva" src="./assets/char-shiva.png" alt="Shiva character placeholder" />

        <section class="top">
          <div class="badge">Astrology Me</div>
          <h1>Let's build your<br />cosmic profile✨</h1>
          <p class="subtitle">
            Pop in your birth details and we'll generate a personal astrology portrait with real chart math under the hood.
          </p>
        </section>

        <section class="form-wrap">
          <form id="chart-form" class="card" novalidate>
            <h2>Start your chart</h2>
            <p class="helper">
              Time and location are used together, so the app resolves the entered place into a timezone before calculating the chart.
            </p>

            <label class="field">
              <span class="sr-only">Name or Nickname</span>
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>
              </span>
              <input type="text" name="name" placeholder="Name or Nickname" autocomplete="name" />
            </label>

            <label class="field">
              <span class="sr-only">Birth date</span>
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3V2zm13 8H4v10h16V10z"/></svg>
              </span>
              <input type="text" name="birthDate" placeholder="Birth date" inputmode="numeric" />
              <span class="hint-right">MM/DD/YYYY&nbsp;&nbsp;AM</span>
            </label>

            <label class="field">
              <span class="sr-only">Birth time</span>
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 7h2v6l5.2 3.12-1 1.72L11 14V7z"/><path d="M12 2a10 10 0 1 0 10 10A10.01 10.01 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/></svg>
              </span>
              <input type="text" name="birthTime" placeholder="Birth time" />
            </label>

            <label class="field">
              <span class="sr-only">Birth location</span>
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 14.5 9 2.5 2.5 0 0 1 12 11.5z"/></svg>
              </span>
              <input type="text" name="birthLocation" placeholder="Birth location" autocomplete="address-level2" />
            </label>

            <button class="cta" type="submit">Start your chart</button>
          </form>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const STORAGE_KEY = 'astrology-me-v5';
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.floor(window.innerWidth * dpr);
          canvas.height = Math.floor(window.innerHeight * dpr);
          canvas.style.width = window.innerWidth + 'px';
          canvas.style.height = window.innerHeight + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          drawStars();
        }

        function drawStars() {
          const starCount = 200;
          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

          for (let i = 0; i < starCount; i += 1) {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const radius = 0.5 + Math.random();
            const alpha = 0.3 + Math.random() * 0.7;

            ctx.beginPath();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#ffffff';
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.globalAlpha = 1;
        }

        const form = document.getElementById('chart-form');
        form.addEventListener('submit', function (event) {
          event.preventDefault();

          const formData = new FormData(form);
          const profile = {
            name: String(formData.get('name') || '').trim(),
            birthDate: String(formData.get('birthDate') || '').trim(),
            birthTime: String(formData.get('birthTime') || '').trim(),
            birthLocation: String(formData.get('birthLocation') || '').trim(),
            savedAt: new Date().toISOString(),
          };

          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              profile,
              ui: {
                darkMode: true,
                activeDomainTab: { love: 'now', money: 'now', career: 'now' },
              },
            })
          );

          const button = form.querySelector('button[type="submit"]');
          const previous = button.textContent;
          button.textContent = 'Chart started ✨';
          setTimeout(function () {
            button.textContent = previous;
          }, 1200);
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
      })();
    </script>
  </body>
</html>
